# Confluent Platform Discovery Configuration
# See CONFIG_REFERENCE.md for complete documentation
# See config-complete.yaml for all available options
# See config-auth-examples.yaml for authentication examples

clusters:
  # ============================================================================
  # Minimal Configuration - Auto-Discovery
  # ============================================================================
  - name: "local-cluster"
    kafka:
      bootstrap_servers: "localhost:9092"

    # All components auto-discovered at:
    # - Schema Registry: http://localhost:8081
    # - Kafka Connect: http://localhost:8083
    # - ksqlDB: http://localhost:8088
    # - REST Proxy: http://localhost:8082
    # - Control Center: http://localhost:9021
    # - Prometheus: http://localhost:9090
    # - Alertmanager: http://localhost:9093

  # ============================================================================
  # With Authentication
  # ============================================================================
  - name: "staging-cluster"
    kafka:
      bootstrap_servers: "broker.staging.example.com:9092"
      security_protocol: "SASL_SSL"
      sasl_mechanism: "SCRAM-SHA-256"
      sasl_username: "${KAFKA_USER}"
      sasl_password: "${KAFKA_PASS}"

    # Shared auth for all Confluent Platform components
    shared_auth:
      username: "${CP_USER}"
      password: "${CP_PASS}"

