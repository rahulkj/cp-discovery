  #     sasl_mechanism: "SCRAM-SHA-512"
  #     sasl_username: "${PROD_KAFKA_USER}"
  #     sasl_password: "${PROD_KAFKA_PASS}"
  #
  #     # SSL/TLS Configuration
  #     ssl_ca_location: "/etc/kafka/ssl/ca-cert.pem"
  #     ssl_cert_location: "/etc/kafka/ssl/client-cert.pem"
  #     ssl_key_location: "/etc/kafka/ssl/client-key.pem"
  #     ssl_key_password: "${SSL_KEY_PASSWORD}"
  #     ssl_endpoint_identification: "https"

  #   shared_auth:
  #     username: "${PROD_CP_USER}"
  #     password: "${PROD_CP_PASS}"

  #   # Override URLs when different from auto-discovered
  #   schema_registry:
  #     url: "https://sr-prod.example.com:8081"

  #   kafka_connect:
  #     url: "https://connect-prod.example.com:8083"

  #   control_center:
  #     url: "https://c3-prod.example.com:9021"

  #   prometheus:
  #     url: "http://prometheus.monitoring.internal:9090"
  #     basic_auth_username: "${PROM_USER}"
