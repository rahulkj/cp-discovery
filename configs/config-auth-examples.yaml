# Confluent Platform Discovery - Authentication Examples
# This file demonstrates various authentication methods

clusters:
  # ============================================================================
  # Example 1: Basic Authentication (Most Common)
  # ============================================================================
  - name: "basic-auth-cluster"
    kafka:
      bootstrap_servers: "broker1:9092"
      security_protocol: "SASL_SSL"
      sasl_mechanism: "PLAIN"
      sasl_username: "${KAFKA_USER}"
      sasl_password: "${KAFKA_PASS}"

    # Use shared auth for all components
    shared_auth:
      username: "${CP_USER}"
      password: "${CP_PASS}"

  # ============================================================================
  # Example 2: Bearer Token Authentication (OAuth/JWT)
  # ============================================================================
  - name: "oauth-cluster"
    kafka:
      bootstrap_servers: "broker2:9092"
      security_protocol: "SASL_SSL"
      sasl_mechanism: "OAUTHBEARER"
      sasl_username: "${KAFKA_USER}"
      sasl_password: "${KAFKA_PASS}"

    schema_registry:
      url: "https://sr.example.com:8081"
      bearer_token: "${SR_JWT_TOKEN}"

    kafka_connect:
      url: "https://connect.example.com:8083"
      bearer_token: "${CONNECT_JWT_TOKEN}"

    ksqldb:
      url: "https://ksqldb.example.com:8088"
      bearer_token: "${KSQLDB_JWT_TOKEN}"

  # ============================================================================
  # Example 3: API Key Authentication
  # ============================================================================
  - name: "apikey-cluster"
    kafka:
      bootstrap_servers: "broker3:9092"

    schema_registry:
      url: "https://sr.example.com:8081"
      api_key: "${SR_API_KEY}"
      # Uses default header: X-API-Key

    kafka_connect:
      url: "https://connect.example.com:8083"
      api_key: "${CONNECT_API_KEY}"
      api_key_header: "X-Connect-API-Key"  # Custom header

    control_center:
      url: "https://c3.example.com:9021"
      api_key: "${C3_API_KEY}"
      api_key_header: "Authorization"  # Some systems use Authorization header

  # ============================================================================
  # Example 4: Mixed Authentication (Different auth per component)
  # ============================================================================
  - name: "mixed-auth-cluster"
    kafka:
      bootstrap_servers: "broker4:9092"
      security_protocol: "SASL_SSL"
      sasl_mechanism: "SCRAM-SHA-256"
      sasl_username: "${KAFKA_USER}"
      sasl_password: "${KAFKA_PASS}"

    # Schema Registry with Basic Auth
    schema_registry:
      url: "https://sr.example.com:8081"
      basic_auth_username: "${SR_USER}"
      basic_auth_password: "${SR_PASS}"

    # Kafka Connect with Bearer Token
    kafka_connect:
      url: "https://connect.example.com:8083"
      bearer_token: "${CONNECT_TOKEN}"

    # ksqlDB with API Key
    ksqldb:
      url: "https://ksqldb.example.com:8088"
      api_key: "${KSQLDB_KEY}"

    # Prometheus with Basic Auth
    prometheus:
      url: "http://prometheus.example.com:9090"
      basic_auth_username: "admin"
      basic_auth_password: "${PROM_PASS}"

  # ============================================================================
  # Example 5: No Authentication (Local Development)
  # ============================================================================
  - name: "local-dev"
    kafka:
      bootstrap_servers: "localhost:9092"

    # All components auto-discovered without authentication
    # schema_registry, kafka_connect, etc. will use default URLs

  # ============================================================================
  # Example 6: Confluent Cloud
  # ============================================================================
  - name: "confluent-cloud"
    kafka:
      bootstrap_servers: "${CCLOUD_BOOTSTRAP_SERVERS}"
      security_protocol: "SASL_SSL"
      sasl_mechanism: "PLAIN"
      sasl_username: "${CCLOUD_API_KEY}"
      sasl_password: "${CCLOUD_API_SECRET}"

    schema_registry:
      url: "${CCLOUD_SR_URL}"
      basic_auth_username: "${CCLOUD_SR_KEY}"
      basic_auth_password: "${CCLOUD_SR_SECRET}"

  # ============================================================================
  # Example 7: LDAP Authentication
  # ============================================================================
  - name: "ldap-cluster"
    kafka:
      bootstrap_servers: "broker5:9092"
      security_protocol: "SASL_SSL"
      sasl_mechanism: "PLAIN"
      sasl_username: "${KAFKA_USER}"
      sasl_password: "${KAFKA_PASS}"

    # Schema Registry with LDAP
    schema_registry:
      url: "https://sr.example.com:8081"
      ldap_enabled: true
      ldap_server: "ldap://ldap.example.com:389"
      ldap_username: "${LDAP_USER}"
      ldap_password: "${LDAP_PASS}"
      ldap_base_dn: "dc=example,dc=com"

    # Kafka Connect with LDAP
    kafka_connect:
      url: "https://connect.example.com:8083"
      ldap_enabled: true
      ldap_server: "ldaps://ldap.example.com:636"  # LDAP over SSL
      ldap_username: "${LDAP_USER}"
      ldap_password: "${LDAP_PASS}"
      ldap_base_dn: "ou=users,dc=example,dc=com"

    # Control Center with LDAP
    control_center:
      url: "https://c3.example.com:9021"
      ldap_enabled: true
      ldap_server: "ldap://ldap.example.com:389"
      ldap_username: "${LDAP_USER}"
      ldap_password: "${LDAP_PASS}"
      ldap_base_dn: "dc=example,dc=com"

  # ============================================================================
  # Example 8: OAuth/SSO Authentication (Client Credentials Flow)
  # ============================================================================
  - name: "oauth-sso-cluster"
    kafka:
      bootstrap_servers: "broker6:9092"
      security_protocol: "SASL_SSL"
      sasl_mechanism: "OAUTHBEARER"
      sasl_username: "${KAFKA_USER}"
      sasl_password: "${KAFKA_PASS}"

    # Schema Registry with OAuth
    schema_registry:
      url: "https://sr.example.com:8081"
      oauth_enabled: true
      oauth_client_id: "${SR_OAUTH_CLIENT_ID}"
      oauth_client_secret: "${SR_OAUTH_CLIENT_SECRET}"
      oauth_token_url: "https://auth.example.com/oauth/token"
      oauth_scopes: "schema-registry.read schema-registry.write"

    # Kafka Connect with OAuth
    kafka_connect:
      url: "https://connect.example.com:8083"
      oauth_enabled: true
      oauth_client_id: "${CONNECT_OAUTH_CLIENT_ID}"
      oauth_client_secret: "${CONNECT_OAUTH_CLIENT_SECRET}"
      oauth_token_url: "https://auth.example.com/oauth/token"
      oauth_scopes: "connect.admin"

    # ksqlDB with OAuth
    ksqldb:
      url: "https://ksqldb.example.com:8088"
      oauth_enabled: true
      oauth_client_id: "${KSQLDB_OAUTH_CLIENT_ID}"
      oauth_client_secret: "${KSQLDB_OAUTH_CLIENT_SECRET}"
      oauth_token_url: "https://auth.example.com/oauth/token"
      oauth_scopes: "ksqldb.query ksqldb.admin"

    # Control Center with OAuth
    control_center:
      url: "https://c3.example.com:9021"
      oauth_enabled: true
      oauth_client_id: "${C3_OAUTH_CLIENT_ID}"
      oauth_client_secret: "${C3_OAUTH_CLIENT_SECRET}"
      oauth_token_url: "https://auth.example.com/oauth/token"
      oauth_scopes: "control-center.read"

  # ============================================================================
  # Example 9: Combined LDAP and OAuth (Fallback Pattern)
  # ============================================================================
  - name: "hybrid-auth-cluster"
    kafka:
      bootstrap_servers: "broker7:9092"

    # Schema Registry tries OAuth first, falls back to LDAP if OAuth fails
    schema_registry:
      url: "https://sr.example.com:8081"
      # Primary: OAuth
      oauth_enabled: true
      oauth_client_id: "${SR_OAUTH_CLIENT_ID}"
      oauth_client_secret: "${SR_OAUTH_CLIENT_SECRET}"
      oauth_token_url: "https://auth.example.com/oauth/token"
      oauth_scopes: "schema-registry.read"
      # Fallback: LDAP
      ldap_enabled: true
      ldap_server: "ldap://ldap.example.com:389"
      ldap_username: "${LDAP_USER}"
      ldap_password: "${LDAP_PASS}"
      ldap_base_dn: "dc=example,dc=com"

    # Kafka Connect with OAuth only
    kafka_connect:
      url: "https://connect.example.com:8083"
      oauth_enabled: true
      oauth_client_id: "${CONNECT_OAUTH_CLIENT_ID}"
      oauth_client_secret: "${CONNECT_OAUTH_CLIENT_SECRET}"
      oauth_token_url: "https://sso.example.com/realms/confluent/protocol/openid-connect/token"
      oauth_scopes: "openid profile email"

output:
  format: "json"
  file: "auth-discovery-report.json"
  detailed: true
