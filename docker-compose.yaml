version: '3.8'

services:
  cp-discovery:
    build: .
    image: cp-discovery:latest
    container_name: cp-discovery
    volumes:
      - ./config.yaml:/home/discovery/config.yaml:ro
      - ./reports:/home/discovery/reports
    environment:
      - TZ=UTC
    networks:
      - confluent-network

# Example: If running alongside Confluent Platform
# Uncomment and adjust as needed
#
# networks:
#   confluent-network:
#     external: true
#     name: your-confluent-network

networks:
  confluent-network:
    driver: bridge
